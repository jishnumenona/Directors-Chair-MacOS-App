name: CI

on:
  push:
    branches: [main, "chore/**", "feature/**", "fix/**", "perf/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint (non-blocking)
    runs-on: macos-15
    # Non-blocking for now: surfaces god-file / force-unwrap debt without failing
    # green CI on code slated for decomposition in WS8/WS9. Remove once
    # file_length no longer errors, then it becomes a required check.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  appcast-generator:
    name: Appcast generator self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: python3 scripts/generate_appcast.py --self-test

  package-tests:
    name: SPM package tests
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - DirectorsChairCore
          - DirectorsChairExports
          - DirectorsChairServices
          - DirectorsChairProduction
          - DirectorsChairViews
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true
      - name: Test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: swift test --parallel --enable-code-coverage
      - name: Code coverage report + logic-layer floor
        if: always()
        working-directory: ${{ matrix.package }}
        # Reports per-package line coverage into the CI log + job summary, and
        # enforces a regression FLOOR on the logic layer (testing-status §7
        # Phase 3). View-heavy packages are not gated here — their rendering
        # is verified by the snapshot + UI E2E layers.
        run: |
          PROF=$(find .build -name default.profdata | head -1)
          TESTBIN=$(find .build -name '*.xctest' -type d | head -1)
          EXE=$(find "$TESTBIN/Contents/MacOS" -type f -perm +111 2>/dev/null | head -1)
          [ -z "$EXE" ] && EXE=$(find "$TESTBIN" -type f -perm +111 2>/dev/null | head -1)
          if [ -z "$PROF" ] || [ -z "$EXE" ]; then
            echo "coverage: profdata/executable not found — skipping"; exit 0
          fi
          TOTAL=$(xcrun llvm-cov report "$EXE" -instr-profile="$PROF" \
            -ignore-filename-regex='.build|Tests' 2>/dev/null | grep TOTAL)
          echo "coverage TOTAL: $TOTAL"
          PCT=$(echo "$TOTAL" | awk '{gsub("%","",$10); print $10}')
          {
            echo "### ${{ matrix.package }} — line coverage: ${PCT}%"
            echo '```'; echo "$TOTAL"; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Logic-layer regression floor (Core is at ~74%; floor 70%).
          if [ "${{ matrix.package }}" = "DirectorsChairCore" ]; then
            FLOOR=70
            AWKPASS=$(awk -v p="$PCT" -v f="$FLOOR" 'BEGIN{print (p+0 >= f) ? "1" : "0"}')
            if [ "$AWKPASS" != "1" ]; then
              echo "::error::DirectorsChairCore line coverage ${PCT}% is below the ${FLOOR}% floor"
              exit 1
            fi
            echo "DirectorsChairCore coverage ${PCT}% ≥ ${FLOOR}% floor ✓"
          fi

  app-tests:
    name: App target tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: Build & test app target
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme DirectorsChair-Desktop \
            -destination 'platform=macOS' \
            -only-testing:DirectorsChair-DesktopTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-test-results
          path: TestResults.xcresult
          retention-days: 7

  ui-e2e:
    name: UI end-to-end (XCUITest)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: Run P0+P1 UI end-to-end suite
        # Drives real user workflows (editor typing / Final Draft flow /
        # new-scene wizard / undo, navigation, story design, timeline,
        # project lifecycle, persistence) against the deterministic QA
        # fixture. The offline TestMode (no auth gate, no network, no global
        # key monitors, no splash) makes launch deterministic on a headless
        # runner. Excludes the auto-generated launch-screenshot tests.
        # -retry-tests-on-failure + -test-iterations 2: a test that flakes on
        # the shared runner is retried once; the job fails only if it fails
        # BOTH times (a real defect, not runner noise). This flakiness
        # resilience is what makes the suite safe to promote to a required
        # check later (testing-status doc, gaps G6 → G3).
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme DirectorsChair-UITests \
            -destination 'platform=macOS' \
            -only-testing:DirectorsChair-DesktopUITests/DirectorsChair_DesktopUITests \
            -retry-tests-on-failure -test-iterations 2 \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify
      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-e2e-results
          path: UITestResults.xcresult
          retention-days: 7

  release-build-check:
    name: Release-config build (main only)
    # A broken Release configuration must surface on merge, not at tag time
    # (release.yml is the only other place Release builds). Main-only to spare
    # macOS minutes on PR pushes.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true
      - name: Build Release configuration
        run: |
          xcodebuild build \
            -scheme DirectorsChair-Desktop \
            -destination 'platform=macOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history so a secret can't hide in an old commit
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Scan working tree + full git history
        # Fails the job if any committed secret is detected. The repo was
        # verified clean of the historic leaked credentials (GitHub PAT,
        # Google key, Gitea token, admin password) on 2026-07-11; this keeps
        # it that way. Promote to a REQUIRED status check after a couple of
        # green runs (branch protection, owner action).
        run: gitleaks detect --source . --redact --verbose --config .gitleaks.toml
