name: CI

on:
  push:
    branches: [main, "chore/**", "feature/**", "fix/**", "perf/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint (non-blocking)
    runs-on: macos-15
    # Non-blocking for now: surfaces god-file / force-unwrap debt without failing
    # green CI on code slated for decomposition in WS8/WS9. Remove once
    # file_length no longer errors, then it becomes a required check.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  package-tests:
    name: SPM package tests
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - DirectorsChairCore
          - DirectorsChairExports
          - DirectorsChairServices
          - DirectorsChairProduction
          - DirectorsChairViews
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true
      - name: Test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: swift test --parallel --enable-code-coverage
      - name: Code coverage summary
        if: always()
        working-directory: ${{ matrix.package }}
        # Reporting only (no threshold gate yet — see testing-status doc §7,
        # Phase 3). Prints per-package line coverage into the CI log and the
        # job summary so the trend is visible on every run.
        run: |
          PROF=$(find .build -name default.profdata | head -1)
          TESTBIN=$(find .build -name '*.xctest' | head -1)
          EXE=$(find "$TESTBIN" -type f -perm +111 2>/dev/null | head -1)
          if [ -n "$PROF" ] && [ -n "$EXE" ]; then
            TOTAL=$(xcrun llvm-cov report "$EXE" -instr-profile="$PROF" \
              -ignore-filename-regex='.build|Tests' 2>/dev/null | grep TOTAL || true)
            echo "coverage TOTAL: $TOTAL"
            echo "### ${{ matrix.package }} coverage" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$TOTAL" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  app-tests:
    name: App target tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: Build & test app target
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme DirectorsChair-Desktop \
            -destination 'platform=macOS' \
            -only-testing:DirectorsChair-DesktopTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-test-results
          path: TestResults.xcresult
          retention-days: 7

  ui-e2e:
    name: UI end-to-end (XCUITest)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true
      - name: Install xcbeautify
        run: brew install xcbeautify
      - name: Run P0+P1 UI end-to-end suite
        # Drives real user workflows (editor typing / Final Draft flow /
        # new-scene wizard / undo, navigation, story design, timeline,
        # project lifecycle, persistence) against the deterministic QA
        # fixture. The offline TestMode (no auth gate, no network, no global
        # key monitors, no splash) makes launch deterministic on a headless
        # runner. Excludes the auto-generated launch-screenshot tests.
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme DirectorsChair-UITests \
            -destination 'platform=macOS' \
            -only-testing:DirectorsChair-DesktopUITests/DirectorsChair_DesktopUITests \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify
      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-results
          path: UITestResults.xcresult
          retention-days: 7
